<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tailor Management System Dashboard - View total customers, orders, and recent activity at a glance." />
    <title>Dashboard – Tailor Management System</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Sidebar Overlay (Mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar -->
<nav class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">✂️</div>
        <div class="logo-text">
            TailorMS
            <span>Management System</span>
        </div>
    </div>
    <div class="sidebar-nav">
        <div class="nav-label">Main Menu</div>
        <a href="/" class="nav-item active">
            <span class="nav-icon">🏠</span> Dashboard
        </a>
        <a href="/customers" class="nav-item">
            <span class="nav-icon">👥</span> Customers
        </a>
        <a href="/orders" class="nav-item">
            <span class="nav-icon">📋</span> Orders
        </a>
    </div>
    <div class="sidebar-footer">
        <p>Tailor Management System v1.0</p>
    </div>
</nav>

<!-- Main Content -->
<div class="main-content">
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-left">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <h1 class="page-title">Dashboard</h1>
        </div>
        <div class="topbar-right">
            <span class="topbar-date" id="topbarDate"></span>
            <div class="user-avatar">T</div>
        </div>
    </div>

    <!-- Page Content -->
    <div class="page-content">

        <!-- Stat Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple">👥</div>
                <div class="stat-info">
                    <div class="stat-label">Total Customers</div>
                    <div class="stat-value" id="totalCustomers">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon cyan">📋</div>
                <div class="stat-info">
                    <div class="stat-label">Total Orders</div>
                    <div class="stat-value" id="totalOrders">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon amber">⏳</div>
                <div class="stat-info">
                    <div class="stat-label">Pending Orders</div>
                    <div class="stat-value" id="pendingOrders">—</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">✅</div>
                <div class="stat-info">
                    <div class="stat-label">Completed Orders</div>
                    <div class="stat-value" id="completedOrders">—</div>
                </div>
            </div>
        </div>

        <!-- Recent Orders Table -->
        <div class="card">
            <div class="section-header">
                <h2 class="section-title">Recent Orders</h2>
                <a href="/orders" class="btn btn-outline btn-sm">View All →</a>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Garment Type</th>
                            <th>Order Date</th>
                            <th>Delivery Date</th>
                            <th>Amount (₹)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="recentOrdersBody">
                        <tr class="loading-row">
                            <td colspan="7"><div class="spinner"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script src="/js/app.js"></script>
<script>
    async function loadDashboard() {
        try {
            // Load stats
            const [custCount, orderStats, recentOrders] = await Promise.all([
                apiGet('/api/customers/count'),
                apiGet('/api/orders/stats'),
                apiGet('/api/orders/recent?limit=7')
            ]);

            animateCounter('totalCustomers', custCount);
            animateCounter('totalOrders', orderStats.total);
            animateCounter('pendingOrders', orderStats.pending);
            animateCounter('completedOrders', orderStats.completed);

            renderRecentOrders(recentOrders);
        } catch (err) {
            showToast('Failed to load dashboard: ' + err.message, 'error');
        }
    }

    // Animate counter from 0 to target value
    function animateCounter(elementId, target) {
        const el = document.getElementById(elementId);
        const duration = 600;
        const start = performance.now();
        const targetNum = parseInt(target) || 0;

        function update(now) {
            const elapsed = now - start;
            const progress = Math.min(elapsed / duration, 1);
            // Ease out cubic
            const eased = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.floor(eased * targetNum);
            if (progress < 1) {
                requestAnimationFrame(update);
            } else {
                el.textContent = targetNum;
            }
        }
        requestAnimationFrame(update);
    }

    function renderRecentOrders(orders) {
        const tbody = document.getElementById('recentOrdersBody');
        if (!orders.length) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="7">
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>No orders yet. <a href="/orders">Add your first order.</a></p>
                        </div>
                    </td>
                </tr>`;
            return;
        }
        tbody.innerHTML = orders.map(o => `
            <tr>
                <td><span class="td-id">#${o.id}</span></td>
                <td class="td-name">${o.customer ? o.customer.name : '—'}</td>
                <td>${o.garmentType}</td>
                <td>${formatDate(o.orderDate)}</td>
                <td>${formatDate(o.deliveryDate)}</td>
                <td>₹${parseFloat(o.amount || 0).toLocaleString('en-IN', {minimumFractionDigits: 2})}</td>
                <td>
                    <span class="badge badge-${o.status === 'Completed' ? 'completed' : 'pending'}">
                        ${o.status}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
